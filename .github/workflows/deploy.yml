name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker images
      run: |
        # Build and push each service
        for service in nps notification-service; do
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
          docker build -t $service ./$service
          docker tag $service:latest ${{ secrets.ECR_REGISTRY }}/$service:latest
          docker push ${{ secrets.ECR_REGISTRY }}/$service:latest
        done

    - name: Deploy to ECS
      run: |
        # Update ECS service
        aws ecs update-service --cluster order-processing-cluster --service order-processing-service --force-new-deployment