name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ process.env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ process.env.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker images
      run: |
        # Build and push each service
        for service in user-service product-service order-service payment-service notification-service; do
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ process.env.ECR_REGISTRY }}
          docker build -t $service ./$service
          docker tag $service:latest ${{ process.env.ECR_REGISTRY }}/$service:latest
          docker push ${{ process.env.ECR_REGISTRY }}/$service:latest
        done

    - name: Deploy to ECS
      run: |
        # Update ECS service
        aws ecs update-service --cluster order-processing-cluster --service order-processing-service --force-new-deployment